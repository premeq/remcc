name: opsx-apply

on:
  push:
    branches:
      - "change/**"

permissions:
  contents: write
  pull-requests: write

# Partition the concurrency group by trigger-vs-noop so that the bot's own
# `/opsx:apply <name>` push, WIP pushes, and other non-trigger commits don't
# cancel an in-flight apply. `cancel-in-progress: true` still applies, but
# only within the `apply` slot — i.e. a fresh `@change-apply: ...` push
# correctly cancels a prior in-flight apply on the same ref.
concurrency:
  group: opsx-apply-${{ github.ref }}-${{ startsWith(github.event.head_commit.message, '@change-apply') && 'apply' || 'noop' }}
  cancel-in-progress: true

jobs:
  apply:
    # Only run when the head commit's subject opts in via the `@change-apply`
    # magic word. Skipped runs cost zero runner time (the job is never
    # provisioned), and the bot's own commit subject (`/opsx:apply <name>`)
    # does not match — implicit self-loop prevention.
    if: ${{ startsWith(github.event.head_commit.message, '@change-apply') }}
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - name: Verify ANTHROPIC_API_KEY is set
        run: |
          if [ -z "${ANTHROPIC_API_KEY}" ]; then
            echo "::error::ANTHROPIC_API_KEY secret is not set on this repository. Add it via 'gh secret set ANTHROPIC_API_KEY' or run templates/gh-bootstrap.sh." >&2
            exit 1
          fi

      - name: Verify REMCC_APP_ID is set
        env:
          REMCC_APP_ID: ${{ secrets.REMCC_APP_ID }}
        run: |
          if [ -z "${REMCC_APP_ID}" ]; then
            echo "::error::REMCC_APP_ID secret is not set. The opsx-apply workflow now mints a GitHub App installation token instead of using a personal access token. Run 'install.sh reconfigure' from a clone of the target repo to install the App credentials." >&2
            exit 1
          fi

      - name: Verify REMCC_APP_PRIVATE_KEY is set
        env:
          REMCC_APP_PRIVATE_KEY: ${{ secrets.REMCC_APP_PRIVATE_KEY }}
        run: |
          if [ -z "${REMCC_APP_PRIVATE_KEY}" ]; then
            echo "::error::REMCC_APP_PRIVATE_KEY secret is not set. The opsx-apply workflow needs the PEM-encoded private key of the remcc GitHub App to mint an installation token. Run 'install.sh reconfigure' from a clone of the target repo to install it." >&2
            exit 1
          fi

      - name: Verify REMCC_APP_SLUG variable is set
        env:
          REMCC_APP_SLUG: ${{ vars.REMCC_APP_SLUG }}
        run: |
          if [ -z "${REMCC_APP_SLUG}" ]; then
            echo "::error::REMCC_APP_SLUG repository variable is not set. The workflow constructs the bot's commit identity from this slug. Run 'install.sh reconfigure' from a clone of the target repo to install it." >&2
            exit 1
          fi

      # GitHub Actions' `startsWith()` expression is case-insensitive, so the
      # job-level `if:` would let `@Change-Apply: ...` (and other case variants)
      # through. The contract in the spec is byte-exact, case-sensitive — this
      # step enforces that with a shell `case` and cancels the run cleanly on
      # mismatch. Case-typos cost ~15-30s of runner time but no Anthropic spend.
      - name: Confirm trigger subject is case-sensitive match
        env:
          HEAD_MSG: ${{ github.event.head_commit.message }}
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          subject="$(printf '%s' "${HEAD_MSG}" | head -n1)"
          case "${subject}" in
            "@change-apply"*)
              echo "Trigger subject matches '@change-apply' (case-sensitive)."
              ;;
            *)
              echo "::notice::Subject '${subject}' did not start with '@change-apply' (case-sensitive); cancelling run." >&2
              gh run cancel "${RUN_ID}" --repo "${GITHUB_REPOSITORY}"
              sleep 60
              exit 1
              ;;
          esac

      - name: Mint GitHub App installation token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.REMCC_APP_ID }}
          private-key: ${{ secrets.REMCC_APP_PRIVATE_KEY }}

      # If the mint step above fails, the most common cause is that the
      # operator hasn't installed the remcc GitHub App on this repository.
      # Point them at the App's installations page so they can fix it without
      # digging through the action's stack trace.
      - name: Annotate App-not-installed failure
        if: failure() && steps.app-token.outcome == 'failure'
        env:
          APP_SLUG: ${{ vars.REMCC_APP_SLUG }}
        run: |
          echo "::error::Failed to mint a GitHub App installation token for '${APP_SLUG}'. The most common cause is that the App has not been installed on this repository. Install it at https://github.com/settings/apps/${APP_SLUG}/installations and re-run." >&2
          exit 1

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}
          token: ${{ steps.app-token.outputs.token }}

      - name: Resolve change name
        id: change
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          case "${REF_NAME}" in
            change/*)
              name="${REF_NAME#change/}"
              ;;
            *)
              echo "::error::Branch '${REF_NAME}' does not match 'change/**'." >&2
              exit 1
              ;;
          esac
          if [ -z "${name}" ]; then
            echo "::error::Resolved change name is empty." >&2
            exit 1
          fi
          if [ ! -d "openspec/changes/${name}" ]; then
            echo "::error::No directory found at openspec/changes/${name}/" >&2
            exit 1
          fi
          echo "name=${name}" >> "$GITHUB_OUTPUT"
          echo "branch=change/${name}" >> "$GITHUB_OUTPUT"

      - name: Switch to change branch
        env:
          BRANCH: ${{ steps.change.outputs.branch }}
        run: |
          set -euo pipefail
          if git show-ref --verify --quiet "refs/heads/${BRANCH}"; then
            git checkout "${BRANCH}"
          elif git show-ref --verify --quiet "refs/remotes/origin/${BRANCH}"; then
            git checkout -B "${BRANCH}" "origin/${BRANCH}"
          else
            git checkout -B "${BRANCH}"
          fi

      - name: Resolve apply config
        id: config
        env:
          VAR_MODEL: ${{ vars.OPSX_APPLY_MODEL }}
          VAR_EFFORT: ${{ vars.OPSX_APPLY_EFFORT }}
        run: |
          set -euo pipefail
          DEFAULT_MODEL="sonnet"
          DEFAULT_EFFORT="high"

          trailers="$(git log -1 --pretty=%B | git interpret-trailers --parse --unfold)"
          trailer_model="$(printf '%s\n' "${trailers}" \
            | awk -F': ' 'BEGIN{IGNORECASE=1} tolower($1)=="opsx-model"{sub(/^[^:]*:[ ]*/, ""); print; exit}')"
          trailer_effort="$(printf '%s\n' "${trailers}" \
            | awk -F': ' 'BEGIN{IGNORECASE=1} tolower($1)=="opsx-effort"{sub(/^[^:]*:[ ]*/, ""); print; exit}')"

          if [ -n "${trailer_model:-}" ]; then
            model="${trailer_model}"
            model_source="commit trailer Opsx-Model"
          elif [ -n "${VAR_MODEL:-}" ]; then
            model="${VAR_MODEL}"
            model_source="repository variable OPSX_APPLY_MODEL"
          else
            model="${DEFAULT_MODEL}"
            model_source="baked-in default"
          fi

          if [ -n "${trailer_effort:-}" ]; then
            effort="${trailer_effort}"
            effort_source="commit trailer Opsx-Effort"
          elif [ -n "${VAR_EFFORT:-}" ]; then
            effort="${VAR_EFFORT}"
            effort_source="repository variable OPSX_APPLY_EFFORT"
          else
            effort="${DEFAULT_EFFORT}"
            effort_source="baked-in default"
          fi

          case "${effort}" in
            low|medium|high) ;;
            *)
              echo "::error::Invalid effort value '${effort}' (source: ${effort_source}). Must be one of: low, medium, high." >&2
              exit 1
              ;;
          esac

          echo "model=${model}" >> "$GITHUB_OUTPUT"
          echo "effort=${effort}" >> "$GITHUB_OUTPUT"
          echo "model_source=${model_source}" >> "$GITHUB_OUTPUT"
          echo "effort_source=${effort_source}" >> "$GITHUB_OUTPUT"

          echo "Resolved model: ${model} (source: ${model_source})"
          echo "Resolved effort: ${effort} (source: ${effort_source})"

      # Derive the target repo's package manager from package.json#packageManager
      # (the same field pnpm/action-setup and oven-sh/setup-bun resolve their
      # version from). pnpm and bun are supported; anything else fails the run
      # before Claude Code is invoked. No adopter edits to this template needed.
      - name: Resolve package manager
        id: pm
        run: |
          set -euo pipefail
          pm="$(jq -r '.packageManager // empty' package.json 2>/dev/null || true)"
          if [ -z "${pm}" ]; then
            echo "::error::package.json has no 'packageManager' field; remcc supports pnpm- or bun-managed repos only (set it to e.g. 'pnpm@9.12.3' or 'bun@1.1.34')." >&2
            exit 1
          fi
          case "${pm}" in
            pnpm@*) name=pnpm ;;
            bun@*)  name=bun ;;
            *)
              echo "::error::package.json#packageManager is '${pm}'; remcc supports pnpm- or bun-managed repos only (value must start with 'pnpm@' or 'bun@')." >&2
              exit 1
              ;;
          esac
          echo "name=${name}" >> "$GITHUB_OUTPUT"
          echo "Resolved package manager: ${name} (from packageManager: ${pm})"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        if: steps.pm.outputs.name == 'pnpm'
        uses: pnpm/action-setup@v4

      - name: Setup bun
        if: steps.pm.outputs.name == 'bun'
        uses: oven-sh/setup-bun@v2

      - name: Install Claude Code and OpenSpec CLIs
        run: npm install -g @anthropic-ai/claude-code @fission-ai/openspec@latest

      - name: Verify CLIs on PATH
        run: |
          claude --version
          openspec --version

      - name: Install workspace dependencies
        run: ${{ steps.pm.outputs.name }} install --frozen-lockfile

      # Set the commit author to the remcc GitHub App's bot identity so the
      # bot-authored commits and the PR open as the same actor. The numeric
      # ID is required (GitHub silently rejects bot commit-author emails that
      # don't match `<id>+<slug>[bot]@users.noreply.github.com`).
      - name: Configure git identity
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          APP_SLUG: ${{ vars.REMCC_APP_SLUG }}
        run: |
          set -euo pipefail
          bot_login="${APP_SLUG}[bot]"
          bot_id="$(gh api "users/${bot_login}" --jq .id)"
          if [ -z "${bot_id}" ] || ! printf '%s' "${bot_id}" | grep -qE '^[0-9]+$'; then
            echo "::error::Could not resolve numeric user ID for '${bot_login}'. Verify REMCC_APP_SLUG matches the App's GitHub slug." >&2
            exit 1
          fi
          git config user.name "${bot_login}"
          git config user.email "${bot_id}+${bot_login}@users.noreply.github.com"

      - name: Run /opsx:apply
        id: apply
        continue-on-error: true
        env:
          CHANGE_NAME: ${{ steps.change.outputs.name }}
          MODEL: ${{ steps.config.outputs.model }}
          EFFORT: ${{ steps.config.outputs.effort }}
          MODEL_SOURCE: ${{ steps.config.outputs.model_source }}
          EFFORT_SOURCE: ${{ steps.config.outputs.effort_source }}
        run: |
          set -o pipefail
          {
            printf 'model: %s (source: %s)\n' "${MODEL}" "${MODEL_SOURCE}"
            printf 'effort: %s (source: %s)\n' "${EFFORT}" "${EFFORT_SOURCE}"
            printf -- '---\n'
          } > apply.log
          case "${EFFORT}" in
            low)    effort_flag="--effort"; effort_value="low" ;;
            medium) effort_flag="--effort"; effort_value="medium" ;;
            high)   effort_flag="--effort"; effort_value="high" ;;
          esac
          # Stream NDJSON to apply.jsonl (full raw audit trail), and a
          # human-readable distillation to apply.log + the Actions console
          # so you can watch the agent think live.
          claude --dangerously-skip-permissions \
            --model "${MODEL}" \
            "${effort_flag}" "${effort_value}" \
            --output-format stream-json --verbose \
            -p "/opsx:apply ${CHANGE_NAME}" 2>&1 \
            | tee -a apply.jsonl \
            | jq --unbuffered -r '
                def tool_summary:
                  . as $tu | ($tu.input // {}) as $i |
                  if   $tu.name == "Bash"      then "→ Bash $ \(($i.command // "?") | gsub("\n"; " ↵ "))"
                  elif $tu.name == "Read"      then "→ Read \($i.file_path // "?")"
                  elif $tu.name == "Edit"      then "→ Edit \($i.file_path // "?")"
                  elif $tu.name == "MultiEdit" then "→ MultiEdit \($i.file_path // "?") (\(($i.edits // []) | length) edits)"
                  elif $tu.name == "Write"     then "→ Write \($i.file_path // "?")"
                  elif $tu.name == "Grep"      then "→ Grep \"\($i.pattern // "?")\"\(if $i.path then " in \($i.path)" else "" end)"
                  elif $tu.name == "Glob"      then "→ Glob \($i.pattern // "?")"
                  elif $tu.name == "WebFetch"  then "→ WebFetch \($i.url // "?")"
                  elif $tu.name == "WebSearch" then "→ WebSearch \"\($i.query // "?")\""
                  elif $tu.name == "Task"      then "→ Task[\($i.subagent_type // "general")] \($i.description // "?")"
                  elif $tu.name == "TodoWrite" then "→ TodoWrite (\(($i.todos // []) | length) items)"
                  else "→ \($tu.name) \(($i | tostring)[0:200])" end;
                if .type == "system" and .subtype == "init" then
                  "[init] model=\(.model // "?") cwd=\(.cwd // "?")"
                elif .type == "assistant" then
                  (.message.content // []) | map(
                    if .type == "text" then .text
                    elif .type == "tool_use" then tool_summary
                    else empty end
                  ) | join("\n")
                elif .type == "result" then
                  "[done] subtype=\(.subtype // "?") cost_usd=\(.total_cost_usd // .cost_usd // 0)"
                else empty end
              ' \
            | tee -a apply.log
          status="${PIPESTATUS[0]}"
          echo "exit_code=${status}" >> "$GITHUB_OUTPUT"
          exit "${status}"

      - name: Run openspec validate
        id: validate
        continue-on-error: true
        env:
          CHANGE_NAME: ${{ steps.change.outputs.name }}
        run: |
          set -o pipefail
          openspec validate "${CHANGE_NAME}" 2>&1 | tee validate.log
          status="${PIPESTATUS[0]}"
          echo "exit_code=${status}" >> "$GITHUB_OUTPUT"
          exit "${status}"

      - name: Run /opsx:verify
        id: verify
        continue-on-error: true
        env:
          CHANGE_NAME: ${{ steps.change.outputs.name }}
          MODEL: ${{ steps.config.outputs.model }}
          EFFORT: ${{ steps.config.outputs.effort }}
        run: |
          set -o pipefail
          case "${EFFORT}" in
            low)    effort_flag="--effort"; effort_value="low" ;;
            medium) effort_flag="--effort"; effort_value="medium" ;;
            high)   effort_flag="--effort"; effort_value="high" ;;
          esac
          # Mirrors the apply step: stream NDJSON to verify.jsonl and a
          # human-readable distillation to verify.log + the Actions console.
          claude --dangerously-skip-permissions \
            --model "${MODEL}" \
            "${effort_flag}" "${effort_value}" \
            --output-format stream-json --verbose \
            -p "/opsx:verify ${CHANGE_NAME}" 2>&1 \
            | tee -a verify.jsonl \
            | jq --unbuffered -r '
                def tool_summary:
                  . as $tu | ($tu.input // {}) as $i |
                  if   $tu.name == "Bash"      then "→ Bash $ \(($i.command // "?") | gsub("\n"; " ↵ "))"
                  elif $tu.name == "Read"      then "→ Read \($i.file_path // "?")"
                  elif $tu.name == "Edit"      then "→ Edit \($i.file_path // "?")"
                  elif $tu.name == "MultiEdit" then "→ MultiEdit \($i.file_path // "?") (\(($i.edits // []) | length) edits)"
                  elif $tu.name == "Write"     then "→ Write \($i.file_path // "?")"
                  elif $tu.name == "Grep"      then "→ Grep \"\($i.pattern // "?")\"\(if $i.path then " in \($i.path)" else "" end)"
                  elif $tu.name == "Glob"      then "→ Glob \($i.pattern // "?")"
                  elif $tu.name == "WebFetch"  then "→ WebFetch \($i.url // "?")"
                  elif $tu.name == "WebSearch" then "→ WebSearch \"\($i.query // "?")\""
                  elif $tu.name == "Task"      then "→ Task[\($i.subagent_type // "general")] \($i.description // "?")"
                  elif $tu.name == "TodoWrite" then "→ TodoWrite (\(($i.todos // []) | length) items)"
                  else "→ \($tu.name) \(($i | tostring)[0:200])" end;
                if .type == "system" and .subtype == "init" then
                  "[init] model=\(.model // "?") cwd=\(.cwd // "?")"
                elif .type == "assistant" then
                  (.message.content // []) | map(
                    if .type == "text" then .text
                    elif .type == "tool_use" then tool_summary
                    else empty end
                  ) | join("\n")
                elif .type == "result" then
                  "[done] subtype=\(.subtype // "?") cost_usd=\(.total_cost_usd // .cost_usd // 0)"
                else empty end
              ' \
            | tee -a verify.log
          status="${PIPESTATUS[0]}"
          echo "exit_code=${status}" >> "$GITHUB_OUTPUT"
          # Extract the last assistant message's concatenated text into
          # verify.md. Use `// ""` and a `|| :` fallback so a crashed
          # verify (empty/malformed NDJSON) leaves the step exit code
          # driven by claude's PIPESTATUS, not by jq.
          jq -rs '
            (([.[] | select(.type == "assistant")] | last) // {}) as $last
            | (($last.message.content // []) | map(select(.type == "text") | .text) | join("")) // ""
          ' verify.jsonl > verify.md 2>/dev/null || : > verify.md
          exit "${status}"

      - name: Stage and commit agent output
        id: commit
        env:
          CHANGE_NAME: ${{ steps.change.outputs.name }}
          APPLY_EXIT: ${{ steps.apply.outputs.exit_code }}
          VALIDATE_EXIT: ${{ steps.validate.outputs.exit_code }}
        run: |
          set -euo pipefail
          git add -A
          # Runner-local logs are already uploaded as the agent-logs artifact;
          # keep them out of git history.
          git reset -- apply.jsonl apply.log validate.log verify.md verify.jsonl 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No staged changes; skipping commit."
            echo "committed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "$(printf '/opsx:apply %s\n\napply exit: %s\nvalidate exit: %s\n' "${CHANGE_NAME}" "${APPLY_EXIT:-unknown}" "${VALIDATE_EXIT:-unknown}")"
            subject="$(git log -1 --pretty=%s)"
            if printf '%s' "${subject}" | grep -q '^@change-apply'; then
              echo "::error::Bot commit subject '${subject}' starts with '@change-apply', which would self-trigger the workflow. The agent-output commit template MUST NOT match the trigger prefix." >&2
              exit 1
            fi
            echo "committed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Push branch
        id: push
        env:
          BRANCH: ${{ steps.change.outputs.branch }}
        run: |
          set -euo pipefail
          git fetch origin "${BRANCH}" || true
          if git show-ref --verify --quiet "refs/remotes/origin/${BRANCH}"; then
            ahead=$(git rev-list --count "origin/${BRANCH}..HEAD")
          else
            ahead=$(git rev-list --count HEAD)
          fi
          if [ "${ahead}" -gt 0 ]; then
            git push origin "HEAD:refs/heads/${BRANCH}"
            echo "pushed=true" >> "$GITHUB_OUTPUT"
          else
            echo "Local branch is not ahead of origin; nothing to push."
            echo "pushed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Open or update PR
        if: always() && steps.change.outputs.name != ''
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          BRANCH: ${{ steps.change.outputs.branch }}
          CHANGE_NAME: ${{ steps.change.outputs.name }}
          APPLY_EXIT: ${{ steps.apply.outputs.exit_code }}
          VALIDATE_EXIT: ${{ steps.validate.outputs.exit_code }}
          VERIFY_EXIT: ${{ steps.verify.outputs.exit_code }}
          MODEL: ${{ steps.config.outputs.model }}
          EFFORT: ${{ steps.config.outputs.effort }}
          MODEL_SOURCE: ${{ steps.config.outputs.model_source }}
          EFFORT_SOURCE: ${{ steps.config.outputs.effort_source }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          git fetch origin main || true
          if git show-ref --verify --quiet "refs/remotes/origin/${BRANCH}"; then
            ahead_of_main=$(git rev-list --count "origin/main..origin/${BRANCH}" 2>/dev/null || echo 0)
          else
            ahead_of_main=0
          fi
          if [ "${ahead_of_main}" = "0" ]; then
            echo "Branch ${BRANCH} has no commits ahead of main; skipping PR step."
            exit 0
          fi
          body=$(cat <<EOF
          Automated /opsx:apply run for change \`${CHANGE_NAME}\`.

          - model: \`${MODEL:-unknown}\` (source: ${MODEL_SOURCE:-unknown})
          - effort: \`${EFFORT:-unknown}\` (source: ${EFFORT_SOURCE:-unknown})
          - apply exit code: \`${APPLY_EXIT:-unknown}\`
          - validate exit code: \`${VALIDATE_EXIT:-unknown}\`
          - verify exit code: \`${VERIFY_EXIT:-unknown}\`
          - run: ${RUN_URL}

          Logs are attached to the workflow run as artifact \`agent-logs-${CHANGE_NAME}\` (14 day retention).
          EOF
          )
          existing=$(gh pr list --head "${BRANCH}" --base main --state open --json number --jq '.[0].number' 2>/dev/null || true)
          if [ -z "${existing}" ]; then
            draft_flag=""
            if [ "${APPLY_EXIT:-1}" != "0" ] || [ "${VALIDATE_EXIT:-1}" != "0" ]; then
              draft_flag="--draft"
            fi
            # shellcheck disable=SC2086
            gh pr create \
              --base main \
              --head "${BRANCH}" \
              --title "Change: ${CHANGE_NAME}" \
              --body "${body}" \
              ${draft_flag}
          else
            gh pr comment "${existing}" --body "${body}"
          fi

      - name: Post verify report
        if: always() && steps.change.outputs.name != ''
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          BRANCH: ${{ steps.change.outputs.branch }}
          CHANGE_NAME: ${{ steps.change.outputs.name }}
          VERIFY_EXIT: ${{ steps.verify.outputs.exit_code }}
        run: |
          set -euo pipefail
          pr_number=$(gh pr list --head "${BRANCH}" --base main --state open --json number --jq '.[0].number' 2>/dev/null || true)
          if [ -z "${pr_number}" ]; then
            echo "No open PR for branch ${BRANCH}; skipping verify comment."
            exit 0
          fi
          # GitHub caps PR-comment bodies at 65 536 chars. Reserve headroom
          # for the truncation footer so the final body stays under the cap.
          MAX_BYTES=65000
          if [ -s verify.md ]; then
            size=$(wc -c < verify.md | tr -d ' ')
            if [ "${size}" -gt "${MAX_BYTES}" ]; then
              {
                head -c "${MAX_BYTES}" verify.md
                printf '\n\n---\n_Report truncated at %s bytes (full size: %s bytes). See the `agent-logs-%s` workflow artifact for the complete `verify.md`._\n' \
                  "${MAX_BYTES}" "${size}" "${CHANGE_NAME}"
              } > verify.comment.md
              gh pr comment "${pr_number}" --body-file verify.comment.md
            else
              gh pr comment "${pr_number}" --body-file verify.md
            fi
          else
            fallback="$(printf '_Verify did not produce a report (verify exit code: \`%s\`). See the \`agent-logs-%s\` workflow artifact for the partial NDJSON stream._' \
              "${VERIFY_EXIT:-unknown}" "${CHANGE_NAME}")"
            gh pr comment "${pr_number}" --body "${fallback}"
          fi

      - name: Upload agent logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-logs-${{ steps.change.outputs.name || 'unresolved' }}
          path: |
            apply.log
            apply.jsonl
            validate.log
            verify.md
            verify.jsonl
          if-no-files-found: ignore
          retention-days: 14
